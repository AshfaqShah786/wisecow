name: wisecow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Update these environment variables as needed
  REGISTRY_DOMAIN: ghcr.io
  IMAGE: ${{ env.REGISTRY_DOMAIN }}/<OWNER>/wisecow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY_DOMAIN }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE }}:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ secrets.KUBECONFIG_DATA != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Decode KUBECONFIG
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config

      - name: Deploy Wisecow to Kubernetes
        run: |
          kubectl set image deployment/wisecow wisecow=${{ env.IMAGE }}:latest --record || true
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/ingress.yaml || true

