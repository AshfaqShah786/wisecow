name: Wisecow CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      #  Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Setup Docker Buildx
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      #  Login to Docker registry
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      #  Build & push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest

      #  Setup kubectl
      - name: Setup kubectl
        uses: actions/setup-kubectl@v3
        with:
          version: 'latest'

      #  Configure kubeconfig from secret
      - name: Configure Kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl cluster-info

      #  Deploy Wisecow to Kubernetes
      - name: Deploy Wisecow
        run: |
          export KUBECONFIG=$PWD/kubeconfig
          kubectl set image deployment/wisecow wisecow=${{ secrets.DOCKERHUB_USERNAME }}/wisecow:latest --record || \
          kubectl apply -f k8s/

